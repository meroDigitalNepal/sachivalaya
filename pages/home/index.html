<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sachivalaya — Nepal's Digital Secretariat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #1a1a1a;
      line-height: 1.6;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header .logo {
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: -0.3px;
    }

    .hero {
      padding: 100px 24px;
      text-align: center;
      background: #fff;
    }

    .hero .label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 16px;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 1.1rem;
      color: #4b5563;
      max-width: 480px;
      margin: 0 auto;
    }

  </style>
</head>
<body>

<header>
  <span class="logo">sachivalaya.org</span>
</header>

<div class="hero">
  <p class="label">Nepal's Digital Secretariat</p>
  <h1 lang="ne">सचिवालय</h1>
  <p>Sachivalaya helps secretariat teams manage executive and legislative work and respond to citizens, all in one place.</p>
</div>

</body>
</html>
