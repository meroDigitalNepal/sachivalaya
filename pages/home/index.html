<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sachivalaya — Nepal's Parliamentary Platform</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      line-height: 1.6;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header .logo {
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: -0.3px;
    }

    .hero {
      padding: 100px 24px;
      text-align: center;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
    }

    .hero .label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 16px;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 1.1rem;
      color: #4b5563;
      max-width: 480px;
      margin: 0 auto;
    }

    .mp-grid {
      max-width: 800px;
      margin: 64px auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .mp-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s, border-color 0.15s;
    }

    .mp-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      border-color: #d1d5db;
    }

    .mp-card img {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      background: #e5e7eb;
      margin-bottom: 12px;
    }

    .mp-card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .mp-card p {
      font-size: 0.8rem;
      color: #6b7280;
    }

    footer {
      border-top: 1px solid #e5e7eb;
      padding: 24px;
      text-align: center;
      font-size: 0.8rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>

<header>
  <span class="logo">sachivalaya.org</span>
</header>

<div class="hero">
  <p class="label">Nepal's Parliamentary Platform</p>
  <h1>Connect with your<br />Member of Parliament.</h1>
  <p>Submit questions, raise grievances, and track responses directly through your MP's office.</p>
</div>

<div class="mp-grid">
  <!-- Add a card for each MP. Example: -->
  <a class="mp-card" href="https://sasmit.sachivalaya.org/">
    <img src="https://sasmit.sachivalaya.org/photo.jpg" alt="Sasmit" onerror="this.style.display='none'" />
    <h2>Sasmit</h2>
    <p>Ministry of Education &amp; Sports</p>
  </a>
</div>

<footer>
  sachivalaya.org
</footer>

</body>
</html>
