<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sachivalaya — Nepal's Digital Secretariat</title>
  <style>
    /* safa theme — Mero's crisp, Apple-inspired light design tokens */
    :root {
      --color-surface: #ffffff;
      --color-surface-raised: #f5f5f7;
      --color-border: #d2d2d7;
      --color-border-strong: #bbbbc0;
      --color-text: #1d1d1f;
      --color-text-subtle: #6e6e73;
      --color-primary: #0071e3;
      --color-on-primary: #ffffff;
      --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      --font-deva: "SF Pro Display", "Noto Sans Devanagari", "Mangal", system-ui, sans-serif;
      --radius-button: 980px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      font-family: var(--font-sans);
      background: var(--color-surface);
      color: var(--color-text);
      line-height: 1.5;
    }

    nav {
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface);
    }

    nav .nav-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
      padding: 0 24px;
    }

    .nav-logo {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--color-text);
      text-decoration: none;
    }

    .hero {
      max-width: 720px;
      margin: 0 auto;
      padding: 140px 24px;
      text-align: center;
    }

    .hero .eyebrow {
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--color-primary);
      margin-bottom: 16px;
    }

    .hero h1 {
      font-family: var(--font-deva);
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      font-weight: 600;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 20px;
    }

    .hero .subtitle {
      font-size: 1.0625rem;
      color: var(--color-text-subtle);
      max-width: 500px;
      margin: 0 auto;
    }

    footer {
      border-top: 1px solid var(--color-border);
      padding: 20px 24px;
      text-align: center;
      font-size: 0.8125rem;
      color: var(--color-text-subtle);
    }

    footer a {
      color: var(--color-primary);
      text-decoration: none;
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="/">sachivalaya.org</a>
  </div>
</nav>

<div class="hero">
  <p class="eyebrow">Nepal's Digital Secretariat</p>
  <h1 lang="ne">सचिवालय</h1>
  <p class="subtitle">Sachivalaya helps secretariat teams manage executive and legislative work and respond to citizens, all in one place.</p>
</div>

<footer>
  Made by Nepaliहरु via
  <a href="https://github.com/meroDigitalNepal" target="_blank" rel="noreferrer">meroDigitalNepal</a>
</footer>

</body>
</html>
