<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sasmit Pokharel — sachivalaya.org</title>
  <style>
    /* safa theme — Mero's crisp, Apple-inspired light design tokens */
    :root {
      --color-surface: #ffffff;
      --color-surface-raised: #f5f5f7;
      --color-border: #d2d2d7;
      --color-border-strong: #bbbbc0;
      --color-text: #1d1d1f;
      --color-text-subtle: #6e6e73;
      --color-primary: #0071e3;
      --color-on-primary: #ffffff;
      --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      --radius-button: 980px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      font-family: var(--font-sans);
      background: var(--color-surface);
      color: var(--color-text);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface);
    }

    nav .nav-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
      padding: 0 24px;
    }

    .nav-logo {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--color-text);
      text-decoration: none;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      max-width: 720px;
      margin: 0 auto;
      padding: 56px 24px;
      text-align: center;
    }

    .hero .portrait {
      width: 100%;
      max-width: 260px;
      height: auto;
      margin-top: 28px;
    }

    .hero .eyebrow {
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--color-primary);
      margin-bottom: 12px;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 600;
      letter-spacing: -0.8px;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .hero .role {
      font-size: 1.0625rem;
      color: var(--color-text-subtle);
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 28px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--color-surface-raised);
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 11px 22px;
      border-radius: var(--radius-button);
      font-size: 0.9375rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn:hover {
      background: #ececee;
      border-color: var(--color-border-strong);
    }

    footer {
      margin-top: auto;
      padding: 20px 24px;
      text-align: center;
      font-size: 0.8125rem;
      color: var(--color-text-subtle);
    }

    footer a {
      color: var(--color-primary);
      text-decoration: none;
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="https://sachivalaya.org">सचिवालय</a>
  </div>
</nav>

<div class="hero">
  <p class="eyebrow">Minister of Education and Sports</p>
  <h1>Sasmit Pokharel</h1>
  <p class="role">How can I help?</p>
  <img class="portrait" src="portrait.webp" alt="Sasmit Pokharel" onerror="this.style.display='none'" />
  <div class="hero-actions">
    <a class="btn" href="https://sasmit.sachivalaya.org/gunaso">Gunaso</a>
    <a class="btn" href="https://www.sasmitpokharel.com/" target="_blank" rel="noreferrer">About me</a>
  </div>
</div>

<footer>
  Made by Nepaliहरु via
  <a href="https://github.com/meroDigitalNepal" target="_blank" rel="noreferrer">meroDigitalNepal</a>
</footer>

</body>
</html>
