name = "gunaso-router"
main = "worker.js"
compatibility_date = "2025-06-01"

# KV namespace that maps MP subdomain → Azure Container App FQDN.
# Run provision-cloudflare.sh once to create the namespace and fill in the id.
[[kv_namespaces]]
binding = "MP_FQDNS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
GITHUB_PAGES_HOST = "REPLACE_WITH_GITHUB_ORG.github.io"
GITHUB_PAGES_REPO = "sachivalaya"

[[routes]]
pattern = "sachivalaya.org/*"
zone_name = "sachivalaya.org"

[[routes]]
pattern = "*.sachivalaya.org/*"
zone_name = "sachivalaya.org"
